version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: AL-Zauk-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-AL-Zauk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AL-Zauk_prod_secret}
      POSTGRES_DB: ${POSTGRES_DB:-AL-Zauk_prod}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U AL-Zauk -d AL-Zauk_prod" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: AL-Zauk-backend-prod
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-AL-Zauk}:${POSTGRES_PASSWORD:-AL-Zauk_prod_secret}@db:5432/${POSTGRES_DB:-AL-Zauk_prod}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-production_secret_key_change_me_to_something_secure}
      PORT: "8080"
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: AL-Zauk-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
